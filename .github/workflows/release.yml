name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Version tag to publish, for example v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
          - os: ubuntu-22.04
            args: ""
          - os: macos-latest
            args: "--target x86_64-apple-darwin"
          - os: macos-latest
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release tag and project versions
        id: release_meta
        shell: bash
        run: |
          TAG="${RELEASE_TAG}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-rc.1, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(node -e "const fs = require('fs'); const match = fs.readFileSync('src-tauri/Cargo.toml', 'utf8').match(/^version\\s*=\\s*\"([^\"]+)\"/m); if (!match) process.exit(1); console.log(match[1]);")"

          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

          if [[ "$VERSION" != "$TAURI_VERSION" ]]; then
            echo "src-tauri/tauri.conf.json version ($TAURI_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "src-tauri/Cargo.toml version ($CARGO_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.release_tag }}
          releaseName: "LingoKey ${{ steps.release_meta.outputs.release_tag }}"
          releaseBody: "Automated desktop release for LingoKey."
          releaseDraft: false
          prerelease: ${{ env.IS_PRERELEASE }}
          generateReleaseNotes: true
          args: ${{ matrix.args }}
